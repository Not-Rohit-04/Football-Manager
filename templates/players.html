<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players</title>
</head>
<body>
    <h1>Players Available</h1>
    {% for player in players %}
    <ul>
        <li>
            <a href="{{url_for('show_player',player_id=player.id)}}">{{player.name}}</a>
        </li>
    </ul>
    {% endfor %}
</body>
</html>
